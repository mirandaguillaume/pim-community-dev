# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:
    pim_ce_dev_src_folder_location: '%kernel.project_dir%'
    version_file_folder_location: '%pim_ce_dev_src_folder_location%'
    index_hosts: '%env(APP_INDEX_HOSTS)%'
    product_and_product_model_index_name: '%env(APP_PRODUCT_AND_PRODUCT_MODEL_INDEX_NAME)%'
    connection_error_index_name: '%env(APP_CONNECTION_ERROR_INDEX_NAME)%'
    events_api_debug_index_name: '%env(APP_EVENTS_API_DEBUG_INDEX_NAME)%'

imports:
    - { resource: pim_parameters.yml }

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: false      # Automatically injects dependencies in your services.
        autoconfigure: false # Automatically registers your services as commands, event subscribers, etc.

    # Override ACL schema + listener for DBAL 4 compatibility (symfony/security-acl is abandoned)
    security.acl.dbal.schema:
        class: Akeneo\Tool\Bundle\StorageUtilsBundle\Doctrine\DBAL\AclSchema
        public: true
        arguments:
            - class_table_name: '%security.acl.dbal.class_table_name%'
              entry_table_name: '%security.acl.dbal.entry_table_name%'
              oid_table_name: '%security.acl.dbal.oid_table_name%'
              oid_ancestors_table_name: '%security.acl.dbal.oid_ancestors_table_name%'
              sid_table_name: '%security.acl.dbal.sid_table_name%'
            - '@doctrine.dbal.default_connection'

    security.acl.dbal.schema_listener:
        class: Akeneo\Tool\Bundle\StorageUtilsBundle\Doctrine\DBAL\AclSchemaListener
        arguments:
            - '@security.acl.dbal.schema'
        tags:
            - { name: doctrine.event_listener, event: postGenerateSchema }
