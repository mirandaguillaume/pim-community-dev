extensions:
    pim-associations-product-and-product-model-picker-modal:
        module: pim/product-edit-form/product-and-product-model-picker
        config:
            datagridName: association-product-picker-grid
            categoryTreeRoute: pim_enrich_product_grid_category_tree
            columnName: id
            fetcher: product

    pim-association-product-and-product-model-picker-modal-filters-column:
        module: oro/datafilter/filters-column
        parent: pim-associations-product-and-product-model-picker-modal
        targetZone: filters
        config:
            displayManageFilters: false
            # Scope to the picker grid: the parent associations tab has its own `association-product-grid`,
            # and `datagrid_collection_set_after` is global — without this the modal's filters react to the
            # tab grid too and race the product save.
            datagridName: association-product-picker-grid

    pim-association-product-and-product-model-picker-modal-filters-selector:
        module: oro/datafilter/filters-selector
        parent: pim-associations-product-and-product-model-picker-modal
        targetZone: filters
