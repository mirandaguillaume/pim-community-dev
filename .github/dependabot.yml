version: 2
updates:
  # Default branch (master)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "production"
    # Let a release sit on the registry before we open a PR for it. Patch and
    # minor bumps merge unattended, so this is the window in which a hijacked
    # release gets noticed and yanked by someone else. Security updates ignore
    # cooldown entirely, so CVE fixes are never held back by it.
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/front-packages/akeneo-design-system"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "production"
    # Let a release sit on the registry before we open a PR for it. Patch and
    # minor bumps merge unattended, so this is the window in which a hijacked
    # release gets noticed and yanked by someone else. Security updates ignore
    # cooldown entirely, so CVE fixes are never held back by it.
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/front-packages/shared"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "production"
    # Let a release sit on the registry before we open a PR for it. Patch and
    # minor bumps merge unattended, so this is the window in which a hijacked
    # release gets noticed and yanked by someone else. Security updates ignore
    # cooldown entirely, so CVE fixes are never held back by it.
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "production"
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]

  #6.0
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "6.0"
    allow:
      - dependency-type: "production"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/front-packages/akeneo-design-system"
    schedule:
      interval: "daily"
    target-branch: "6.0"
    allow:
      - dependency-type: "production"
    open-pull-requests-limit: 0

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "6.0"
    allow:
      - dependency-type: "production"
    ignore:
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]

  #5.0
