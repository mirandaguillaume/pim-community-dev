# =============================================================================
# MUTATION TESTING AUDIT — manual trigger only
#
# Runs Infection (PHP) and/or Stryker (JS/TS) on the entire codebase to
# produce a baseline Mutation Score Indicator (MSI) report.
#
# This is an audit job, not a gate — it never blocks PRs or pushes.
# Expected runtime: 1–4 hours depending on scope.
# =============================================================================
name: Mutation Audit

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to audit'
        required: true
        type: choice
        options:
          - both
          - php
          - js
        default: both
      php-filter:
        description: 'Infection --filter (e.g. "src/Akeneo/Category" to restrict scope)'
        required: false
        type: string
        default: ''
      php-only-covered:
        description: 'Skip mutating files with 0% coverage (faster)'
        required: false
        type: boolean
        default: true
      php-threads:
        description: 'Infection --threads (max = all CPUs)'
        required: false
        type: string
        default: 'max'
      js-filter:
        description: 'Stryker scope (workspace to mutate)'
        required: false
        type: choice
        options:
          - all
          - shared
          - design-system
          - identifier-generator
          - connectivity
          - measure
          - catalog-volume
          - process-tracker
          - dqi
        default: all

env:
  COMPOSER_MEMORY_LIMIT: -1
  DOCKER_BUILDKIT: 1

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # BUILD PHP IMAGE (reuse the same image as CI)
  # ===========================================================================
  image:
    if: inputs.scope == 'both' || inputs.scope == 'php'
    uses: ./.github/workflows/reusable-image.yml
    secrets: inherit

  # ===========================================================================
  # PHP MUTATION TESTING (Infection)
  # ===========================================================================
  mutation-php:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: image
    if: inputs.scope == 'both' || inputs.scope == 'php'
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pim-job
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-base-images: 'false'

      # Infection needs coverage data — generate it first with Xdebug
      - name: Generate PHPUnit coverage for Infection
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          mkdir -p var/infection
          sudo chmod -R a+rwX var/infection
          docker-compose run --rm --user "${HOST_UID}:${HOST_GID}" \
            -e XDEBUG_MODE=coverage \
            -e APP_ENV=test_fake \
            php php vendor/bin/phpunit -c . \
              --testsuite PHPUnit_Unit_Test \
              --coverage-xml var/infection/coverage-xml \
              --log-junit var/infection/junit.xml

      - name: Run Infection mutation testing
        env:
          INPUT_THREADS: ${{ inputs.php-threads }}
          INPUT_ONLY_COVERED: ${{ inputs.php-only-covered }}
          INPUT_FILTER: ${{ inputs.php-filter }}
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          INFECTION_ARGS="--threads=${INPUT_THREADS}"
          INFECTION_ARGS="${INFECTION_ARGS} --coverage=var/infection"
          INFECTION_ARGS="${INFECTION_ARGS} --skip-initial-tests"
          INFECTION_ARGS="${INFECTION_ARGS} --show-mutations"
          INFECTION_ARGS="${INFECTION_ARGS} --no-interaction"

          if [ "${INPUT_ONLY_COVERED}" = "true" ]; then
            INFECTION_ARGS="${INFECTION_ARGS} --only-covered"
          fi

          if [ -n "${INPUT_FILTER}" ]; then
            INFECTION_ARGS="${INFECTION_ARGS} --filter=${INPUT_FILTER}"
          fi

          echo "Running: vendor/bin/infection ${INFECTION_ARGS}"

          docker-compose run --rm --user "${HOST_UID}:${HOST_GID}" \
            -e APP_ENV=test_fake \
            php php vendor/bin/infection ${INFECTION_ARGS} || true

          # Always produce reports even if Infection exits non-zero (MSI below threshold)

      - name: Infection summary
        if: always()
        run: |
          echo "## Infection Mutation Testing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f var/infection/summary.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat var/infection/summary.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f var/infection/per-mutator.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Per-mutator breakdown" >> "$GITHUB_STEP_SUMMARY"
            cat var/infection/per-mutator.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Infection reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-reports
          path: |
            var/infection/infection.html
            var/infection/infection.json
            var/infection/infection.log
            var/infection/summary.log
            var/infection/per-mutator.md
          retention-days: 30

  # ===========================================================================
  # JS/TS MUTATION TESTING (Stryker)
  # ===========================================================================
  mutation-js:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    if: inputs.scope == 'both' || inputs.scope == 'js'
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Restore yarn cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            front-packages/akeneo-design-system/lib
            front-packages/shared/lib
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared packages
        run: |
          yarn dsm:build
          yarn shared:build

      - name: Create output directory
        run: mkdir -p var/stryker

      - name: Resolve Stryker mutate scope
        id: scope
        env:
          JS_FILTER: ${{ inputs.js-filter }}
        run: |
          # Stryker CLI splits --mutate on commas, so we use that as the
          # separator for ts + tsx patterns (no brace expansion).
          case "${JS_FILTER}" in
            shared)               MUTATE="front-packages/shared/src/**/*.ts,front-packages/shared/src/**/*.tsx" ;;
            design-system)        MUTATE="front-packages/akeneo-design-system/src/**/*.ts,front-packages/akeneo-design-system/src/**/*.tsx" ;;
            identifier-generator) MUTATE="components/identifier-generator/front/src/**/*.ts,components/identifier-generator/front/src/**/*.tsx" ;;
            connectivity)         MUTATE="src/Akeneo/Connectivity/Connection/front/src/**/*.ts,src/Akeneo/Connectivity/Connection/front/src/**/*.tsx" ;;
            measure)              MUTATE="src/Akeneo/Tool/Bundle/MeasureBundle/front/src/**/*.ts,src/Akeneo/Tool/Bundle/MeasureBundle/front/src/**/*.tsx" ;;
            catalog-volume)       MUTATE="src/Akeneo/Platform/Bundle/CatalogVolumeMonitoringBundle/front/src/**/*.ts,src/Akeneo/Platform/Bundle/CatalogVolumeMonitoringBundle/front/src/**/*.tsx" ;;
            process-tracker)      MUTATE="src/Akeneo/Platform/Job/front/process-tracker/src/**/*.ts,src/Akeneo/Platform/Job/front/process-tracker/src/**/*.tsx" ;;
            dqi)                  MUTATE="src/Akeneo/Pim/Automation/DataQualityInsights/front/src/**/*.ts" ;;
            *)                    MUTATE="" ;;
          esac
          echo "mutate=${MUTATE}" >> "$GITHUB_OUTPUT"
          echo "Scope: ${JS_FILTER} → ${MUTATE:-all (from config)}"

      - name: Run Stryker mutation testing
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          STRYKER_MUTATE: ${{ steps.scope.outputs.mutate }}
        run: |
          # coverageAnalysis=all: traces coverage per file (not per test).
          # perTest adds ~25s Jest fork overhead per mutant causing mass timeouts.
          # 'all' does a single dry run, then only runs tests covering each file.
          # 2x faster than 'off' and no false timeouts unlike 'perTest'.
          # timeoutMS=30000: Jest fork overhead is ~25s, default 5s is too short.
          # concurrency=4: self-hosted runners share one machine (62GB RAM),
          # running multiple audits in parallel causes resource contention.
          COMMON_ARGS="--tempDirName $RUNNER_TEMP/stryker-tmp --coverageAnalysis all --timeoutMS 30000 --concurrency 4"
          if [ -n "$STRYKER_MUTATE" ]; then
            yarn stryker run $COMMON_ARGS --mutate "$STRYKER_MUTATE" || true
          else
            yarn stryker run $COMMON_ARGS || true
          fi

      - name: Stryker summary
        if: always()
        run: |
          echo "## Stryker Mutation Testing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f var/stryker/mutation-report.json ]; then
            echo "Report generated. Download the HTML artifact for the interactive report." >> "$GITHUB_STEP_SUMMARY"
            # Extract summary stats from JSON
            if command -v jq &>/dev/null; then
              KILLED=$(jq '[.files[].mutants[] | select(.status == "Killed")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              SURVIVED=$(jq '[.files[].mutants[] | select(.status == "Survived")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              TIMEOUT=$(jq '[.files[].mutants[] | select(.status == "Timeout")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              NO_COV=$(jq '[.files[].mutants[] | select(.status == "NoCoverage")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              TOTAL=$(jq '[.files[].mutants[]] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|------:|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Killed | ${KILLED} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Survived | ${SURVIVED} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Timeout | ${TIMEOUT} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| No Coverage | ${NO_COV} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No report generated. Check the logs for errors." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-reports
          path: |
            var/stryker/mutation-report.html
            var/stryker/mutation-report.json
          retention-days: 30
