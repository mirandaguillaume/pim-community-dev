# =============================================================================
# MUTATION TESTING AUDIT — manual trigger only
#
# Runs Infection (PHP) and/or Stryker (JS/TS) on the entire codebase to
# produce a baseline Mutation Score Indicator (MSI) report.
#
# This is an audit job, not a gate — it never blocks PRs or pushes.
# Expected runtime: 1–4 hours depending on scope.
# =============================================================================
name: Mutation Audit

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to audit'
        required: true
        type: choice
        options:
          - both
          - php
          - js
        default: both
      php-filter:
        description: 'Infection --filter (e.g. "src/Akeneo/Category" to restrict scope)'
        required: false
        type: string
        default: ''
      php-only-covered:
        description: 'Only mutate covered code (default). Uncheck to include uncovered files (slower).'
        required: false
        type: boolean
        default: true
      php-threads:
        description: 'Infection --threads (max = all CPUs)'
        required: false
        type: string
        default: 'max'

env:
  COMPOSER_MEMORY_LIMIT: -1
  DOCKER_BUILDKIT: 1

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # BUILD PHP IMAGE (reuse the same image as CI)
  # ===========================================================================
  image:
    if: inputs.scope == 'both' || inputs.scope == 'php'
    uses: ./.github/workflows/reusable-image.yml
    secrets: inherit

  # ===========================================================================
  # PHP MUTATION TESTING (Infection)
  # ===========================================================================
  mutation-php:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: image
    if: inputs.scope == 'both' || inputs.scope == 'php'
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pim-job
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-base-images: 'false'

      - name: Prepare directories
        run: |
          mkdir -p var/infection var/infection-phpspec
          sudo chmod -R a+rwX var/infection var/infection-phpspec

      - name: Run Infection with PHPUnit
        env:
          INPUT_THREADS: ${{ inputs.php-threads }}
          INPUT_ONLY_COVERED: ${{ inputs.php-only-covered }}
          INPUT_FILTER: ${{ inputs.php-filter }}
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          INFECTION_ARGS="--threads=${INPUT_THREADS}"
          INFECTION_ARGS="${INFECTION_ARGS} --test-framework=phpunit"
          INFECTION_ARGS="${INFECTION_ARGS} --test-framework-options='--testsuite=PHPUnit_Unit_Test'"
          INFECTION_ARGS="${INFECTION_ARGS} --initial-tests-php-options='-d zend_extension=xdebug.so -d xdebug.mode=coverage'"
          INFECTION_ARGS="${INFECTION_ARGS} --show-mutations"
          INFECTION_ARGS="${INFECTION_ARGS} --no-interaction"

          # Infection 0.32+ only mutates covered code by default.
          # Use --with-uncovered to include non-covered code (slower).
          if [ "${INPUT_ONLY_COVERED}" != "true" ]; then
            INFECTION_ARGS="${INFECTION_ARGS} --with-uncovered"
          fi

          if [ -n "${INPUT_FILTER}" ]; then
            INFECTION_ARGS="${INFECTION_ARGS} --filter=${INPUT_FILTER}"
          fi

          echo "Running: vendor/bin/infection ${INFECTION_ARGS}"

          docker-compose run --rm --user "${HOST_UID}:${HOST_GID}" \
            -e APP_ENV=test_fake \
            -e XDEBUG_MODE=coverage \
            php php vendor/bin/infection ${INFECTION_ARGS} || true

      # PHPSpec mutation testing (separate run — Infection only supports one framework per run)
      - name: Run Infection with PHPSpec
        env:
          INPUT_THREADS: ${{ inputs.php-threads }}
          INPUT_FILTER: ${{ inputs.php-filter }}
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          mkdir -p var/infection-phpspec

          INFECTION_ARGS="--test-framework=phpspec"
          INFECTION_ARGS="${INFECTION_ARGS} --test-framework-options='--config=phpspec-coverage.yml'"
          INFECTION_ARGS="${INFECTION_ARGS} --initial-tests-php-options='-d zend_extension=xdebug.so -d xdebug.mode=coverage'"
          INFECTION_ARGS="${INFECTION_ARGS} --threads=${INPUT_THREADS}"
          INFECTION_ARGS="${INFECTION_ARGS} --show-mutations"
          INFECTION_ARGS="${INFECTION_ARGS} --no-interaction"
          INFECTION_ARGS="${INFECTION_ARGS} --logger-html=var/infection-phpspec/infection.html"
          INFECTION_ARGS="${INFECTION_ARGS} --logger-text=var/infection-phpspec/infection.log"
          INFECTION_ARGS="${INFECTION_ARGS} --logger-summary-json=var/infection-phpspec/summary.json"

          if [ -n "${INPUT_FILTER}" ]; then
            INFECTION_ARGS="${INFECTION_ARGS} --filter=${INPUT_FILTER}"
          fi

          echo "Running: vendor/bin/infection ${INFECTION_ARGS}"

          docker-compose run --rm --user "${HOST_UID}:${HOST_GID}" \
            -e APP_ENV=test_fake \
            -e XDEBUG_MODE=coverage \
            php php vendor/bin/infection ${INFECTION_ARGS} || true

      - name: Infection summary
        if: always()
        run: |
          echo "## Infection — PHPUnit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f var/infection/infection-summary.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat var/infection/infection-summary.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Infection — PHPSpec" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f var/infection-phpspec/summary.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat var/infection-phpspec/summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Infection reports (PHPUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-phpunit-reports
          path: |
            var/infection/
          retention-days: 30

      - name: Upload Infection reports (PHPSpec)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infection-phpspec-reports
          path: |
            var/infection-phpspec/
          retention-days: 30

  # ===========================================================================
  # JS/TS MUTATION TESTING (Stryker)
  # ===========================================================================
  mutation-js:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    if: inputs.scope == 'both' || inputs.scope == 'js'
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Restore yarn cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            front-packages/akeneo-design-system/lib
            front-packages/shared/lib
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared packages
        run: |
          yarn dsm:build
          yarn shared:build

      - name: Create output and temp directories
        run: |
          mkdir -p var/stryker
          sudo rm -rf /tmp/stryker-tmp
          mkdir -p /tmp/stryker-tmp

      - name: Run Stryker mutation testing
        run: yarn mutation-front || true
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Stryker summary
        if: always()
        run: |
          echo "## Stryker Mutation Testing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f var/stryker/mutation-report.json ]; then
            echo "Report generated. Download the HTML artifact for the interactive report." >> "$GITHUB_STEP_SUMMARY"
            # Extract summary stats from JSON
            if command -v jq &>/dev/null; then
              KILLED=$(jq '[.files[].mutants[] | select(.status == "Killed")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              SURVIVED=$(jq '[.files[].mutants[] | select(.status == "Survived")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              TIMEOUT=$(jq '[.files[].mutants[] | select(.status == "Timeout")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              NO_COV=$(jq '[.files[].mutants[] | select(.status == "NoCoverage")] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              TOTAL=$(jq '[.files[].mutants[]] | length' var/stryker/mutation-report.json 2>/dev/null || echo "?")
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|------:|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Killed | ${KILLED} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Survived | ${SURVIVED} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Timeout | ${TIMEOUT} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| No Coverage | ${NO_COV} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No report generated. Check the logs for errors." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-reports
          path: |
            var/stryker/mutation-report.html
            var/stryker/mutation-report.json
          retention-days: 30
